<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CxKitty Web{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81'}
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- Nav bar -->
    <nav class="bg-white shadow-sm border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <a href="/courses" class="text-xl font-bold text-primary-600 tracking-tight">CxKitty Web</a>
            <div class="flex items-center gap-4">
                {% if session.get("name") %}
                <span class="text-sm text-gray-500">{{ session.name }}</span>
                <a href="/logout" class="text-sm text-gray-400 hover:text-red-500 transition-colors">退出</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="max-w-6xl mx-auto px-4 mt-3 space-y-2">
        {% for category, msg in messages %}
        <div class="px-4 py-3 rounded-lg text-sm
            {% if category == 'error' %}bg-red-50 text-red-700 border border-red-200
            {% elif category == 'success' %}bg-green-50 text-green-700 border border-green-200
            {% else %}bg-blue-50 text-blue-700 border border-blue-200{% endif %}
        ">{{ msg }}</div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- Content -->
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center text-xs text-gray-300 py-6">
        CxKitty Web UI
    </footer>
</body>
</html>
